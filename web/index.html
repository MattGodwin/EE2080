<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Estate Retrofit Mini Sim</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="left">
      <canvas id="map" width="800" height="500"></canvas>
      <div class="hud">
        <div><b>Budget:</b> £<span id="budget">0</span></div>
        <div><b>Estate CO₂:</b> <span id="co2">0</span> kg/yr</div>
        <div><b>Livability:</b> <span id="live">0</span>/100</div>
      </div>
    </div>

    <div class="right">
      <h2 id="panelTitle">Click a house</h2>
      <div id="panelBody" class="panel"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
